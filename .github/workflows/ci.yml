name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

permissions:
  contents: read

jobs:
  shell-regressions:
    name: shell-regressions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run shell regression tests
        shell: bash
        run: |
          bash tests/test-review-regressions.sh
          bash superpowers-bridge/tests/test-status-sync.sh

  powershell-status-sync:
    name: powershell-status-sync
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run PowerShell status sync tests
        shell: pwsh
        run: pwsh -File superpowers-bridge/tests/test-status-sync.ps1
