name: Release Trigger

on:
  workflow_dispatch:
    inputs:
      extension_id:
        description: 'Extension directory name (e.g., aide, extensify, presetify)'
        required: true
        type: string
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate inputs
        env:
          EXTENSION_ID: ${{ github.event.inputs.extension_id }}
          VERSION: ${{ github.event.inputs.version }}
        run: |
          # Strip optional v prefix
          VERSION="${VERSION#v}"

          # Validate version format
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Invalid version format '$VERSION'. Must be X.Y.Z" >&2
            exit 1
          fi

          # Validate extension directory exists
          if [[ ! -d "$EXTENSION_ID" ]]; then
            echo "Error: Extension directory '$EXTENSION_ID' not found" >&2
            exit 1
          fi

          # Validate extension.yml exists
          if [[ ! -f "$EXTENSION_ID/extension.yml" ]]; then
            echo "Error: $EXTENSION_ID/extension.yml not found" >&2
            exit 1
          fi

          TAG="${EXTENSION_ID}-v${VERSION}"

          # Check if tag already exists
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Error: Tag '$TAG' already exists" >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_ENV"
          echo "Will create tag: $TAG"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Validate PUSH_TOKEN secret
        env:
          PUSH_TOKEN: ${{ secrets.PUSH_TOKEN }}
        run: |
          if [[ -z "$PUSH_TOKEN" ]]; then
            echo "Error: Repository secret PUSH_TOKEN is not set" >&2
            exit 1
          fi

      - name: Create and push tag
        env:
          GITHUB_REPO: ${{ github.repository }}
          PUSH_TOKEN: ${{ secrets.PUSH_TOKEN }}
        run: |
          # Use a personal access token (stored in secrets.PUSH_TOKEN) to push so the push can trigger other workflows.
          # Create the tag locally and push via HTTPS using the token. Ensure you set repository secret PUSH_TOKEN with a PAT that has repo access.
          git tag "$tag"
          # Ensure checkout's default auth header does not override PAT auth.
          git config --local --unset-all http.https://github.com/.extraheader || true
          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPO}.git"
          git push origin "$tag"
          echo "Pushed tag $tag via PUSH_TOKEN — release workflow should trigger"
